<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dot Sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" media="print" onload="this.media='all'">
<style>

  :root {
    --bg: #070b14; --panel: #0d1526; --panel2: #111e35;
    --border: #1e3a5f; --text: #a8c8f0; --text-dim: #3a5a80;
    --cont-bg: #0d1526;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); font-family: 'Rajdhani', sans-serif; color: var(--text); display: flex; flex-direction: column; align-items: center; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(168,200,240,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(168,200,240,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(168,200,240,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, rgba(168,200,240,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(168,200,240,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, rgba(168,200,240,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(168,200,240,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 35%, rgba(168,200,240,0.15) 0%, transparent 100%);
  }

  #app { position: relative; z-index: 1; width: 100%; height: 100%; max-width: 540px; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 4px; gap: 6px; }
  .game-title { font-family: 'Orbitron', monospace; font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 20px rgba(0,245,212,0.6), 0 0 40px rgba(0,245,212,0.2); flex-shrink: 0; }
  .stats { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
  .stat { text-align: center; }
  .stat-val { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; color: #fff; }
  .stat-label { font-size: 0.55rem; letter-spacing: 2px; color: #7ab8e8; text-transform: uppercase; font-family: 'Orbitron', monospace; font-weight: 600; }
  .header-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .header-btn { background: var(--panel2); border: 1px solid var(--border); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; padding: 6px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  .header-btn:active { background: var(--border); }
  .header-btn:disabled { opacity: 0.3; cursor: default; }
  #undo-btn { border-color: #ff9f1c44; color: #ff9f1c; }
  #undo-btn:not(:disabled):active { background: #ff9f1c22; border-color: #ff9f1c; }


  /* ── Message ── */
  #message { flex-shrink: 0; font-family: 'Orbitron', monospace; font-size: 0.58rem; letter-spacing: 2px; color: #7ab8e8; text-align: center; padding: 2px 10px 4px; min-height: 18px; transition: color 0.25s; }
  #message.active { color: #00f5d4; text-shadow: 0 0 10px #00f5d4; }
  #message.error  { color: #f72585; text-shadow: 0 0 10px #f72585; }

  /* ── Game screen ── */
  #game-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 2px 8px 8px; }
  #game-screen.hidden { display: none; }

  /* ── Grid ── */
  #containers-grid { flex: 1; display: grid; gap: 8px; align-items: stretch; }

  .container {
    background: transparent; color: var(--border);
    border-radius: 0; cursor: pointer; position: relative; overflow: visible;
    transition: color 0.2s, box-shadow 0.2s;
  }
  .container::before { display: none; }
  .container.target-ready { color: rgba(255,255,255,0.35); box-shadow: 0 0 18px rgba(255,255,255,0.08); }
  .container.complete { color: #7fff00; box-shadow: 0 0 18px rgba(127,255,0,0.25); }
  @keyframes flashRed {
    0%   { color: #f72585; box-shadow: 0 0 30px rgba(247,37,133,0.9); }
    45%  { color: #f72585; box-shadow: 0 0 40px rgba(247,37,133,1); }
    100% { color: var(--border); box-shadow: none; }
  }
  .container.flash-blocked { animation: flashRed 0.55s ease forwards; }
  @keyframes flashFill {
    0%   { fill: rgba(247,37,133,0.18); }
    45%  { fill: rgba(247,37,133,0.22); }
    100% { fill: var(--panel); }
  }
  .cont-bg-flash { animation: flashFill 0.55s ease forwards; }
  .container-svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }

  .dot-cell { display: flex; align-items: center; justify-content: center; }
  .dot { border-radius: 50%; cursor: pointer; flex-shrink: 0; position: relative; transition: transform 0.12s, box-shadow 0.12s; }
  .dot::after { content: ''; position: absolute; top: 18%; left: 22%; width: 30%; height: 28%; background: rgba(255,255,255,0.38); border-radius: 50%; }
  .dot:active { transform: scale(0.82); }
  .dot.highlighted { transform: scale(1.15); z-index: 2; }

  /* ── Settings ── */
  #settings-screen { display: none; flex-direction: column; align-items: center; gap: 20px; padding: 24px 20px; flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
  #settings-screen.visible { display: flex; }
  .settings-title { font-family: 'Orbitron', monospace; font-size: 1.1rem; letter-spacing: 4px; color: #fff; }
  .setting-row { width: 100%; display: flex; flex-direction: column; gap: 7px; }
  .setting-row label { font-size: 0.72rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
  .val-display { font-family: 'Orbitron', monospace; font-size: 1.2rem; color: #00f5d4; text-shadow: 0 0 10px #00f5d4; text-align: center; }
  .slider { width: 100%; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #00f5d4; box-shadow: 0 0 10px #00f5d4; cursor: pointer; }
  .start-btn { margin-top: 6px; background: linear-gradient(135deg, #0a2040, #0d1a30); border: 1.5px solid #00f5d4; color: #00f5d4; font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; letter-spacing: 4px; padding: 14px 44px; border-radius: 10px; cursor: pointer; box-shadow: 0 0 20px rgba(0,245,212,0.2); transition: all 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  .start-btn:active { box-shadow: 0 0 30px rgba(0,245,212,0.5); transform: scale(0.97); }
  .repeat-btn { border-color: #bc6ff1; color: #bc6ff1; box-shadow: 0 0 20px rgba(188,111,241,0.2); }
  .repeat-btn:active { box-shadow: 0 0 30px rgba(188,111,241,0.5); }
  .game-instructions { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; letter-spacing: 4px; text-align: center; line-height: 1.9; padding: 0 14px; margin-top: 16px; }
  .game-instructions .inst-line { display: block; }
  .game-instructions .inst-verb { color: #00f5d4; text-shadow: 0 0 10px rgba(0,245,212,0.6); }
  .game-instructions .inst-obj  { color: #bc6ff1; text-shadow: 0 0 10px rgba(188,111,241,0.5); }
  .game-instructions .inst-goal { color: #baff29; text-shadow: 0 0 10px rgba(186,255,41,0.5); }

  /* ── Win overlay ── */
  #win-overlay { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  #win-overlay.visible { display: flex; pointer-events: all; }
  #win-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #win-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 32px 44px; background: rgba(7,11,20,0.85); border: 1px solid rgba(127,255,0,0.3); border-radius: 24px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .win-label { font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 5px; color: rgba(127,255,0,0.7); }
  #win-title { font-family: 'Orbitron', monospace; font-size: 3rem; font-weight: 900; color: #7fff00; letter-spacing: 6px; line-height: 1; }
  .win-divider { width: 80px; height: 1px; background: rgba(127,255,0,0.3); margin: 2px 0; }
  .win-moves-label { font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }
  #win-moves-count { font-family: 'Orbitron', monospace; font-size: 2.8rem; font-weight: 900; color: #00f5d4; letter-spacing: 2px; text-shadow: 0 0 30px rgba(0,245,212,0.8); }
  .win-time-row { font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; letter-spacing: 3px; color: var(--text-dim); }
  .win-time-row span { font-family: 'Orbitron', monospace; color: var(--text); }
  .win-btn-row { display: flex; gap: 12px; margin-top: 12px; }
  .win-btn { background: linear-gradient(135deg, #0a2040, #0d1a30); font-family: 'Orbitron', monospace; font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; padding: 11px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  .win-btn:active { transform: scale(0.97); }
  .win-btn-primary   { border: 1.5px solid #00f5d4; color: #00f5d4; box-shadow: 0 0 16px rgba(0,245,212,0.2); }
  .win-btn-secondary { border: 1.5px solid #bc6ff1; color: #bc6ff1; box-shadow: 0 0 16px rgba(188,111,241,0.15); }
  .win-btn-primary:active   { box-shadow: 0 0 28px rgba(0,245,212,0.5); }
  .win-btn-secondary:active { box-shadow: 0 0 28px rgba(188,111,241,0.4); }

  @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  #win-moves-count.pop { animation: countUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="game-title">DOT·SORT</div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="move-count">0</div><div class="stat-label">Moves</div></div>
      <div class="stat"><div class="stat-val" id="timer-display">0:00</div><div class="stat-label">Time</div></div>
    </div>
    <div class="header-btns">
      <button class="header-btn" id="undo-btn" disabled>UNDO</button>
      <button class="header-btn" id="menu-btn">MENU</button>
    </div>
  </header>

  <!-- Settings -->
  <div id="settings-screen" class="visible">
    <div class="settings-title">NEW GAME</div>

    <div class="setting-row">
      <label>Colors</label>
      <div class="val-display" id="colors-val">6</div>
      <input type="range" class="slider" id="colors-slider" min="2" max="8" value="6">
    </div>

    <div class="setting-row">
      <label>Dots per Color</label>
      <div class="val-display" id="dotspercolor-val">10</div>
      <input type="range" class="slider" id="dotspercolor-slider" min="2" max="20" value="10">
    </div>

    <button class="start-btn" id="start-btn">START GAME</button>
    <button class="start-btn repeat-btn" id="settings-repeat-btn" style="display:none;">SAME GAME AGAIN</button>
    <div class="game-instructions">
      <span class="inst-line"><span class="inst-verb">MOVE</span> the color dots</span>
      <span class="inst-line">from one <span class="inst-obj">container to another</span></span>
      <span class="inst-line">until every container holds</span>
      <span class="inst-line"><span class="inst-goal">only one color</span></span>
    </div>
  </div>

  <!-- Game -->
  <div id="game-screen" class="hidden">
    <div id="message">TAP A DOT TO SELECT ITS COLOR</div>
    <div id="containers-grid"></div>
  </div>
</div>

<!-- Win overlay -->
<div id="win-overlay">
  <canvas id="win-canvas"></canvas>
  <div id="win-content">
    <div class="win-label">Puzzle Complete</div>
    <div id="win-title">SORTED!</div>
    <div class="win-divider"></div>
    <div class="win-moves-label">Moves Taken</div>
    <div id="win-moves-count">0</div>
    <div class="win-time-row">Time &nbsp;<span id="win-time-display">0:00</span></div>
    <div class="win-btn-row">
      <button class="win-btn win-btn-secondary" id="btn-repeat">SAME GAME</button>
      <button class="win-btn win-btn-primary"   id="btn-new">NEW GAME</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { name: 'cyan',       hex: '#00f5d4', shadow: 'rgba(0,245,212,0.75)'    },
  { name: 'red',        hex: '#ff2020', shadow: 'rgba(255,32,32,0.75)'    },
  { name: 'lime',       hex: '#baff29', shadow: 'rgba(186,255,41,0.75)'   },
  { name: 'navy',       hex: '#1a6fff', shadow: 'rgba(26,111,255,0.75)'   },
  { name: 'violet',     hex: '#bc6ff1', shadow: 'rgba(188,111,241,0.75)'  },
  { name: 'yellow',     hex: '#ffe600', shadow: 'rgba(255,230,0,0.75)'    },
  { name: 'light grey', hex: '#c8c8d4', shadow: 'rgba(200,200,212,0.75)'  },
  { name: 'dark grey',  hex: '#5a5a6e', shadow: 'rgba(90,90,110,0.75)'    },
];

// ── State ─────────────────────────────────────────────────────────────────
const state = {
  containers: [], numColors: 6, dotsPerColor: 10, maxDots: 12,
  selected: null, moves: 0, timerInterval: null, seconds: 0, won: false,
  get numContainers() { return this.numColors; },
};

let savedSeed   = null;
let moveHistory = [];
const deepCopy = arr => arr.map(c => [...c]);
const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

// ── Sliders ─────────────────────────────────────────────────────────────
function getSliderValues() {
  return {
    colors:      +document.getElementById('colors-slider').value,
    dotsPerColor:+document.getElementById('dotspercolor-slider').value,
  };
}

function bindSliders() {
  const colSlider = document.getElementById('colors-slider');
  const dpcSlider = document.getElementById('dotspercolor-slider');

  colSlider.addEventListener('input', () => {
    document.getElementById('colors-val').textContent = colSlider.value;
  });
  dpcSlider.addEventListener('input', () => {
    document.getElementById('dotspercolor-val').textContent = dpcSlider.value;
  });

  document.getElementById('colors-val').textContent       = colSlider.value;
  document.getElementById('dotspercolor-val').textContent = dpcSlider.value;
}

// ── Entry points ──────────────────────────────────────────────────────────
function startFromSettings() {
  const v = getSliderValues();
  state.numColors    = v.colors;
  state.dotsPerColor = v.dotsPerColor;
  state.maxDots      = v.dotsPerColor + 1;  // always exactly one more than dotsPerColor
  launchGame(false);
}

function repeatGame() { launchGame(true);  }
function newGame()    { launchGame(false); }

// ── Core launcher ─────────────────────────────────────────────────────────
function launchGame(repeat) {
  stopWin();

  if (repeat && savedSeed) {
    state.containers = deepCopy(savedSeed);
  } else {
    const N   = state.numContainers;
    const dpc = state.dotsPerColor;
    const md  = state.maxDots;   // = dpc + 1

    // Build and shuffle full dot pool
    const pool = [];
    for (let c = 0; c < state.numColors; c++)
      for (let d = 0; d < dpc; d++) pool.push(c);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    // Distribute randomly into containers — fill each to exactly dotsPerColor.
    // maxDots (= dpc+1) is gameplay headroom, not the starting fill level.
    const conts = Array.from({length: N}, () => []);
    let pi = 0;
    for (let ci = 0; ci < N && pi < pool.length; ci++) {
      while (conts[ci].length < dpc && pi < pool.length) conts[ci].push(pool[pi++]);
    }

    // "Lone dot" rule: at least ceil(N/2) containers must contain exactly one dot
    // of some color that appears nowhere else in that container (a lone singleton).
    // Strategy: pick ceil(N/2) containers; for each, ensure it has a lone dot by
    // moving one dot of a color that has no other rep in that container.
    const target = Math.ceil(N / 2);

    function hasLone(cont) {
      // Returns true if the container has at least one color that appears exactly once in it
      const counts = {};
      cont.forEach(c => { counts[c] = (counts[c] || 0) + 1; });
      return Object.values(counts).some(v => v === 1);
    }

    // Shuffle container indices so we pick randomly which get the lone treatment
    const ciOrder = Array.from({length: N}, (_, i) => i);
    for (let i = ciOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [ciOrder[i], ciOrder[j]] = [ciOrder[j], ciOrder[i]];
    }

    let loneCount = ciOrder.filter(ci => hasLone(conts[ci])).length;

    // For containers that don't yet have a lone dot, inject one by swapping:
    // find a color c where this container has >1 of c, swap one away to another
    // container that has room and already has at least one c (so the donor keeps
    // a lone slot — we don't need to track that here, just ensure the recipient
    // ends up with exactly one unique dot after the swap).
    for (let oi = 0; oi < N && loneCount < target; oi++) {
      const ci = ciOrder[oi];
      if (hasLone(conts[ci])) continue;

      // Count colors in this container
      const counts = {};
      conts[ci].forEach(c => { counts[c] = (counts[c] || 0) + 1; });

      // Try to introduce a lone dot by swapping in a color not yet present here
      // from another container, in exchange for a duplicate color here.
      let fixed = false;
      // Colors not in this container — candidates to swap IN
      const absent = [];
      for (let c = 0; c < state.numColors; c++) {
        if (!counts[c]) absent.push(c);
      }
      // Try each absent color
      for (const inColor of absent) {
        if (fixed) break;
        // Find a donor container that has ≥2 of inColor and has room for a dot we send back
        for (let di = 0; di < N; di++) {
          if (di === ci) continue;
          const donorCount = conts[di].filter(x => x === inColor).length;
          if (donorCount < 2) continue; // donor must keep at least 1 after giving
          if (conts[di].length >= md) continue; // donor must have room for the swap-back dot

          // Pick a duplicate color from ci to send to donor
          const sendColor = Object.keys(counts).map(Number).find(c => counts[c] >= 2);
          if (sendColor === undefined) continue;

          // Execute swap: remove one inColor from donor, add sendColor; remove sendColor from ci, add inColor
          const dIdx = conts[di].indexOf(inColor);
          conts[di].splice(dIdx, 1);
          conts[di].push(sendColor);

          const cIdx = conts[ci].indexOf(sendColor);
          conts[ci].splice(cIdx, 1);
          conts[ci].push(inColor);

          fixed = true;
          break;
        }
      }

      if (fixed && hasLone(conts[ci])) loneCount++;
    }

    state.containers = conts;
    savedSeed = deepCopy(state.containers);
  }

  moveHistory = [];
  updateUndoBtn();

  state.selected = null; state.moves = 0; state.won = false; state.seconds = 0;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.seconds++;
    document.getElementById('timer-display').textContent = fmt(state.seconds);
  }, 1000);

  document.getElementById('move-count').textContent    = '0';
  document.getElementById('timer-display').textContent = '0:00';
  document.getElementById('settings-screen').classList.remove('visible');
  document.getElementById('game-screen').classList.remove('hidden');

  gameInProgress = true;
  document.getElementById('menu-btn').textContent = 'MENU';
  document.getElementById('settings-repeat-btn').style.display = savedSeed ? '' : 'none';
  setMsg('TAP A DOT TO SELECT ITS COLOR', '');
  renderAll();
}

// ── Undo ──────────────────────────────────────────────────────────────────
function updateUndoBtn() {
  document.getElementById('undo-btn').disabled = moveHistory.length === 0;
}
function pushHistory() {
  moveHistory.push(deepCopy(state.containers));
  updateUndoBtn();
}
function undoMove() {
  if (!moveHistory.length) return;
  state.containers = moveHistory.pop();
  state.moves = Math.max(0, state.moves - 1);
  document.getElementById('move-count').textContent = state.moves;
  state.selected = null;
  updateUndoBtn();
  setMsg('TAP A DOT TO SELECT ITS COLOR', '');
  renderAll();
}

// ── Layout ────────────────────────────────────────────────────────────────
function calcLayout() {
  const n = state.numContainers;
  let cols, rows;
  if      (n <= 3) { cols = n; rows = 1; }
  else if (n === 4){ cols = 2; rows = 2; }
  else if (n <= 6) { cols = 3; rows = Math.ceil(n/3); }
  else             { cols = 4; rows = Math.ceil(n/4); }

  const CGAP = 8, PAD = 6;
  const gameEl = document.getElementById('game-screen');
  const msgEl  = document.getElementById('message');
  const availW = gameEl.clientWidth - 16;
  const availH = gameEl.clientHeight - msgEl.offsetHeight - 8;

  const contW = (availW - CGAP*(cols-1)) / cols;
  const contH = (availH - CGAP*(rows-1)) / rows;
  const innerW = contW - PAD*2;
  const innerH = contH - PAD*2;

  let bestDotSize = 6, bestCellW = 10, bestCellH = 10, bestPerRow = 1;
  for (let pr = 1; pr <= state.maxDots; pr++) {
    const nr    = Math.ceil(state.maxDots / pr);
    const cellW = innerW / pr;
    const cellH = innerH / nr;
    const dSize = Math.min(cellW, cellH) * 0.88;
    if (dSize > bestDotSize) {
      bestDotSize = dSize; bestCellW = cellW; bestCellH = cellH; bestPerRow = pr;
    }
  }

  return {
    cols, rows,
    contW: Math.floor(contW), contH: Math.floor(contH),
    perRow: bestPerRow,
    numDotRows: Math.ceil(state.maxDots / bestPerRow),
    cellW: bestCellW, cellH: bestCellH,
    dotSize: Math.floor(bestDotSize),
  };
}

// ── Render ────────────────────────────────────────────────────────────────
function renderAll() {
  const grid = document.getElementById('containers-grid');
  grid.innerHTML = '';
  const L = calcLayout();
  grid.style.gridTemplateColumns = `repeat(${L.cols}, 1fr)`;
  grid.style.gridTemplateRows    = `repeat(${L.rows}, 1fr)`;
  document.documentElement.style.setProperty('--dot-size', L.dotSize+'px');

  state.containers.forEach((dots, ci) => {
    const cont = document.createElement('div');
    cont.className = 'container';
    cont.dataset.index = ci;

    const PAD = 6;
    const W = L.contW, H = L.contH;
    const lastRowCols = state.maxDots % L.perRow === 0 ? L.perRow : state.maxDots % L.perRow;
    const hasNotch = lastRowCols < L.perRow;

    cont.style.cssText = `width:${W}px;height:${H}px;padding:${PAD}px;display:grid;`+
      `grid-template-columns:repeat(${L.perRow},${L.cellW}px);`+
      `grid-template-rows:repeat(${L.numDotRows},${L.cellH}px);gap:0;`;

    // Build an SVG border that follows the actual container shape.
    // When the last dot-row is partial, the border notches inward at the
    // bottom-right so the boundary matches exactly what's usable.
    const R = 11; // corner radius (slightly inside the 12px CSS border-radius)
    const sw = 1.5; // stroke width
    const o = sw / 2; // inset offset so stroke doesn't clip
    const bx = o, by = o, bw = W - sw, bh = H - sw;

    let pathD;
    if (!hasNotch) {
      // Simple rounded-rect path
      pathD = `M${bx+R},${by} L${bx+bw-R},${by} Q${bx+bw},${by} ${bx+bw},${by+R}`+
              ` L${bx+bw},${by+bh-R} Q${bx+bw},${by+bh} ${bx+bw-R},${by+bh}`+
              ` L${bx+R},${by+bh} Q${bx},${by+bh} ${bx},${by+bh-R}`+
              ` L${bx},${by+R} Q${bx},${by} ${bx+R},${by} Z`;
    } else {
      // Notched path: the border steps inward at the last row.
      // notchX = right edge of the last used column (inside padding).
      // The notch corner is at: x = PAD + lastRowCols*cellW, y = H - PAD - cellH
      const nx = PAD + lastRowCols * L.cellW; // notch x (content coords)
      const ny = H - PAD - L.cellH;           // notch y (top of last row)
      // We want the inner notch corners slightly rounded too.
      const nr = Math.min(R, L.cellW * 0.4, L.cellH * 0.4);
      pathD =
        // top-left corner, across top, top-right corner
        `M${bx+R},${by} L${bx+bw-R},${by} Q${bx+bw},${by} ${bx+bw},${by+R}`+
        // right side down to where last row starts
        ` L${bx+bw},${ny-nr} Q${bx+bw},${ny} ${bx+bw-nr},${ny}`+
        // step left along the notch top edge to notch point
        ` L${nx+nr},${ny} Q${nx},${ny} ${nx},${ny+nr}`+
        // down the notch left side to bottom
        ` L${nx},${by+bh-R} Q${nx},${by+bh} ${nx-R},${by+bh}`+
        // along bottom back to bottom-left corner
        ` L${bx+R},${by+bh} Q${bx},${by+bh} ${bx},${by+bh-R}`+
        // left side back up to top-left
        ` L${bx},${by+R} Q${bx},${by} ${bx+R},${by} Z`;
    }

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    svg.setAttribute('class', 'container-svg');
    // Background fill polygon (same shape as the border)
    const bgPath = document.createElementNS(svgNS, 'path');
    bgPath.setAttribute('d', pathD);
    bgPath.setAttribute('fill', 'var(--cont-bg)');
    bgPath.setAttribute('stroke', 'none');
    bgPath.setAttribute('class', 'cont-bg');
    // Flash overlay path (shown when flash-blocked fires)
    const flashPath = document.createElementNS(svgNS, 'path');
    flashPath.setAttribute('d', pathD);
    flashPath.setAttribute('fill', 'transparent');
    flashPath.setAttribute('stroke', 'none');
    flashPath.setAttribute('class', 'cont-flash');
    // Border stroke polygon
    const borderPath = document.createElementNS(svgNS, 'path');
    borderPath.setAttribute('d', pathD);
    borderPath.setAttribute('fill', 'none');
    borderPath.setAttribute('stroke', 'currentColor');
    borderPath.setAttribute('stroke-width', sw);
    svg.appendChild(bgPath); svg.appendChild(flashPath); svg.appendChild(borderPath);
    cont.appendChild(svg);

    if (isComplete(ci)) cont.classList.add('complete');
    const isTarget = state.selected && state.selected.containerIndex !== ci &&
        dots.length + state.selected.count <= state.maxDots;
    if (isTarget) cont.classList.add('target-ready');
    // Set the CSS variable for SVG background fill based on container state
    const bgFill = isTarget ? 'var(--panel2)' : 'var(--panel)';
    cont.style.setProperty('--cont-bg', bgFill);

    for (let slot = 0; slot < state.maxDots; slot++) {
      const cell = document.createElement('div');
      cell.className = 'dot-cell';
      cell.style.cssText = `width:${L.cellW}px;height:${L.cellH}px;`;

      if (slot < dots.length) {
        const colorIdx = dots[slot];
        const col = COLORS[colorIdx];
        const isHi = state.selected &&
          state.selected.containerIndex === ci &&
          state.selected.colorIndex === colorIdx;
        const dot = document.createElement('div');
        dot.className = 'dot'+(isHi?' highlighted':'');
        dot.style.cssText = `width:${L.dotSize}px;height:${L.dotSize}px;background:${col.hex};`+
          `box-shadow:0 0 ${Math.round(L.dotSize*(isHi?0.75:0.38))}px ${col.shadow}${isHi?',0 0 3px #fff':''};`;
        dot.addEventListener('click', e => { e.stopPropagation(); onDotClick(ci, colorIdx); });
        cell.appendChild(dot);
      }
      cont.appendChild(cell);
    }

    cont.addEventListener('click', () => onContainerClick(ci));
    grid.appendChild(cont);
  });
}

function isComplete(ci) {
  const d = state.containers[ci];
  if (d.length === 0) return false;
  const color = d[0];
  // All dots in container are same color AND container holds exactly all of that color
  // (i.e., no other container has any of this color)
  if (!d.every(x => x === color)) return false;
  return !state.containers.some((other, oi) =>
    oi !== ci && other.some(x => x === color)
  );
}

function checkWin() {
  const map = {};
  state.containers.forEach((dots, ci) => dots.forEach(d => { (map[d]=map[d]||new Set()).add(ci); }));
  return Object.values(map).every(s => s.size === 1);
}

// ── Interaction ───────────────────────────────────────────────────────────
function onDotClick(ci, colorIdx) {
  if (state.won) return;
  if (state.selected && state.selected.containerIndex !== ci) { onContainerClick(ci); return; }
  if (state.selected && state.selected.containerIndex === ci && state.selected.colorIndex === colorIdx) {
    state.selected = null; setMsg('TAP A DOT TO SELECT ITS COLOR',''); renderAll(); return;
  }
  const count = state.containers[ci].filter(d => d === colorIdx).length;
  state.selected = { containerIndex: ci, colorIndex: colorIdx, count };
  setMsg(`${count} ${COLORS[colorIdx].name.toUpperCase()} DOT${count>1?'S':''} SELECTED — TAP TARGET`, 'active');
  renderAll();
}

function onContainerClick(targetIdx) {
  if (state.won || !state.selected) return;
  const { containerIndex, colorIndex, count } = state.selected;
  if (containerIndex === targetIdx) {
    state.selected = null; setMsg('TAP A DOT TO SELECT ITS COLOR',''); renderAll(); return;
  }
  const targetDots = state.containers[targetIdx];
  if (targetDots.length + count > state.maxDots) {
    state.selected = null;   // clear selection first so renderAll unhighlights dots
    renderAll();
    requestAnimationFrame(() => {
      document.querySelectorAll('.container').forEach(el => {
        if (+el.dataset.index === targetIdx) {
          el.classList.remove('flash-blocked'); void el.offsetWidth; el.classList.add('flash-blocked');
          // Also animate the SVG fill overlay for the notched background
          const fp = el.querySelector('.cont-flash');
          if (fp) { fp.classList.remove('cont-bg-flash'); void fp.getBoundingClientRect(); fp.classList.add('cont-bg-flash'); }
        }
      });
    });
    setMsg('NO ROOM — TAP A DOT TO START AGAIN','error');
    setTimeout(() => {
      if (!state.won && !state.selected)
        setMsg('TAP A DOT TO SELECT ITS COLOR','');
    }, 1200);
    return;
  }

  pushHistory();
  const moved = [];
  state.containers[containerIndex] = state.containers[containerIndex].filter(d => {
    if (d === colorIndex && moved.length < count) { moved.push(d); return false; }
    return true;
  });
  state.containers[targetIdx] = [...targetDots, ...moved];
  state.moves++;
  document.getElementById('move-count').textContent = state.moves;
  state.selected = null;

  if (checkWin()) {
    state.won = true; gameInProgress = false; clearInterval(state.timerInterval);
    renderAll(); setTimeout(showWin, 500); return;
  }
  setMsg('TAP A DOT TO SELECT ITS COLOR','');
  renderAll();
}

function setMsg(t, type) { const el = document.getElementById('message'); el.textContent=t; el.className=type||''; }

// ── Win ───────────────────────────────────────────────────────────────────
let winRafId = null, particles = [];

function showWin() {
  const canvas  = document.getElementById('win-canvas');
  const movesEl = document.getElementById('win-moves-count');
  const content = document.getElementById('win-content');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  document.getElementById('win-overlay').classList.add('visible');
  document.getElementById('win-time-display').textContent = fmt(state.seconds);
  const finalMoves = state.moves;
  movesEl.textContent = '0'; movesEl.classList.remove('pop');
  content.style.opacity='0'; content.style.transform='translateY(24px)';
  setTimeout(()=>{ content.style.transition='opacity 0.5s ease,transform 0.5s cubic-bezier(0.16,1,0.3,1)'; content.style.opacity='1'; content.style.transform='translateY(0)'; },100);
  const rollDur=Math.min(1800,300+finalMoves*40), t0=performance.now();
  function roll(now) {
    const p=Math.min((now-t0)/rollDur,1), e=1-Math.pow(1-p,3);
    movesEl.textContent=Math.round(e*finalMoves);
    if(p<1) requestAnimationFrame(roll);
    else { movesEl.textContent=finalMoves; movesEl.classList.add('pop'); }
  }
  setTimeout(()=>requestAnimationFrame(roll),400);
  spawnParticles(canvas, COLORS.slice(0,state.numColors).map(c=>c.hex));
}

function stopWin() {
  if(winRafId){cancelAnimationFrame(winRafId);winRafId=null;}
  particles=[];
  document.getElementById('win-overlay').classList.remove('visible');
  const c=document.getElementById('win-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function spawnParticles(canvas, colors) {
  const ctx=canvas.getContext('2d'); particles=[];
  const cx=canvas.width/2, cy=canvas.height/2;
  for(let i=0;i<120;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*10;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*4,size:4+Math.random()*10,color:colors[Math.floor(Math.random()*colors.length)],alpha:1,decay:0.008+Math.random()*0.012,gravity:0.18+Math.random()*0.15,shape:Math.random()<0.6?'circle':'rect',rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.15,trail:[]});
  }
  for(let wave=0;wave<3;wave++){
    setTimeout(()=>{
      for(let i=0;i<50;i++){
        const side=Math.random()<0.5?-1:1,a=(Math.random()-0.5)*Math.PI*0.8+(side===1?0:Math.PI),sp=3+Math.random()*8;
        particles.push({x:side===1?canvas.width*0.85:canvas.width*0.15,y:canvas.height*(0.3+Math.random()*0.4),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,size:5+Math.random()*9,color:colors[Math.floor(Math.random()*colors.length)],alpha:1,decay:0.007+Math.random()*0.01,gravity:0.15+Math.random()*0.12,shape:Math.random()<0.5?'circle':'rect',rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.18,trail:[]});
      }
    },wave*300);
  }
  if(winRafId) cancelAnimationFrame(winRafId);
  drawParticles(ctx,canvas);
}

function drawParticles(ctx,canvas){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(7,11,20,0.18)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.alpha>0.02);
  particles.forEach(p=>{
    p.trail.push({x:p.x,y:p.y,alpha:p.alpha}); if(p.trail.length>6) p.trail.shift();
    p.trail.forEach((pt,ti)=>{ctx.globalAlpha=pt.alpha*(ti/p.trail.length)*0.35;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(pt.x,pt.y,p.size*0.5*(ti/p.trail.length),0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color; ctx.shadowBlur=p.size*1.5; ctx.shadowColor=p.color;
    if(p.shape==='circle'){ctx.beginPath();ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2);ctx.fill();}
    else{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();}
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    p.vy+=p.gravity; p.x+=p.vx; p.y+=p.vy; p.vx*=0.985; p.alpha-=p.decay; p.rotation+=p.rotSpeed;
  });
  if(particles.length>0) winRafId=requestAnimationFrame(()=>drawParticles(ctx,canvas));
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ── Nav ───────────────────────────────────────────────────────────────────
let gameInProgress = false; // true once a game has started and not yet won

document.getElementById('menu-btn').addEventListener('click', () => {
  const settingsVisible = document.getElementById('settings-screen').classList.contains('visible');

  if (settingsVisible && gameInProgress) {
    // Settings are showing and there's a game to return to — resume it
    document.getElementById('settings-screen').classList.remove('visible');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('menu-btn').textContent = 'MENU';
    // Restart the timer from where it paused
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
      state.seconds++;
      document.getElementById('timer-display').textContent = fmt(state.seconds);
    }, 1000);
    renderAll();
  } else {
    // In-game: pause and go to settings
    clearInterval(state.timerInterval);
    stopWin();
    state.selected = null;
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('settings-screen').classList.add('visible');
    document.getElementById('menu-btn').textContent = gameInProgress ? 'RESUME' : 'MENU';
    document.getElementById('settings-repeat-btn').style.display = (gameInProgress && savedSeed) ? '' : 'none';
  }
});

document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('start-btn').addEventListener('click', startFromSettings);
document.getElementById('btn-new').addEventListener('click', newGame);
document.getElementById('settings-repeat-btn').addEventListener('click', repeatGame);
document.getElementById('btn-repeat').addEventListener('click', repeatGame);

window.addEventListener('resize', () => {
  const c=document.getElementById('win-canvas');
  if(c){c.width=window.innerWidth;c.height=window.innerHeight;}
  if(!state.won && !document.getElementById('game-screen').classList.contains('hidden')) renderAll();
});

bindSliders();

// iOS Safari fix: ensure buttons fire reliably by adding touchend fallback.
// On iOS, click events on buttons can be silently swallowed in certain layouts.
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    this.click();
  }, { passive: false });
});
</script>
